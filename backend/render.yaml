services:
  - type: web
    name: smartmeal-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SPOONACULAR_API_KEY
        sync: false
      - key: CLIENT_URL
        sync: false

